<!DOCTYPE html>
<html lang="es-MX">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transporte MAHE | Sitio en construcción</title>
<meta name="description" content="El sitio de Transporte MAHE está en construcción. Contáctanos por WhatsApp para más información.">

<style>
  :root {
    --bronze-dark: #2e1c10;
    --bronze-mid: #8a5a2e;
    --bronze-light: #c9884f;
    --bronze-highlight: #e3ab74;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    height: 100%;
    font-family: "Segoe UI", system-ui, -apple-system, Roboto, Arial, sans-serif;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    text-align: center;
    color: #fff;
    background-color: #0a0a0a;
    background-image:
      radial-gradient(circle at 20% 20%, rgba(255,255,255,0.035) 0%, transparent 45%),
      radial-gradient(circle at 80% 70%, rgba(255,255,255,0.03) 0%, transparent 45%),
      repeating-linear-gradient(45deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 4px);
  }
  .card {
    max-width: 560px;
    width: 100%;
  }
  .logo { height: 64px; width: auto; margin-bottom: 28px; }
  h1 {
    font-size: clamp(1.6rem, 4vw, 2.3rem);
    margin: 0 0 14px;
    text-shadow: 0 2px 10px rgba(0,0,0,0.25);
  }
  p {
    font-size: 1.05rem;
    margin: 0 0 32px;
    color: rgba(255,255,255,0.92);
    line-height: 1.6;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: linear-gradient(90deg, var(--bronze-mid), var(--bronze-highlight));
    color: var(--bronze-dark);
    text-decoration: none;
    font-weight: 700;
    padding: 15px 30px;
    border-radius: 999px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.45);
    transition: transform .15s ease;
  }
  .btn:hover { transform: translateY(-2px); }
</style>
</head>
<body>
  <div class="card">
    <img class="logo" src="assets/img/logo/logo_mahe_blanco.svg" alt="Transporte MAHE">
    <h1>Estamos construyendo nuestro nuevo sitio web</h1>
    <p>Muy pronto tendremos lista toda la información sobre nuestros servicios de transporte de personal empresarial en Querétaro. Mientras tanto, contáctanos directamente y con gusto te atendemos.</p>
    <a class="btn" href="https://wa.me/524461096696?text=He%20revisado%20su%20sitio%20web%20y%20quisiera%20ponerme%20en%20contacto%20con%20ustedes%20para%20tener%20m%C3%A1s%20informaci%C3%B3n%20de%20sus%20servicios" target="_blank" rel="noopener">
      💬 Escríbenos por WhatsApp
    </a>
  </div>

</html>
